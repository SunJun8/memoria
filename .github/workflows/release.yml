name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.1 or v0.1.1"
        required: true
        type: string
      publish_pypi:
        description: "Publish the Python package to PyPI"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            input="${{ inputs.version }}"
            version="${input#v}"
            tag="v${version}"
          fi
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          if [[ "${version}" != "${project_version}" ]]; then
            echo "Requested version ${version} does not match pyproject.toml ${project_version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: release-test-py${{ matrix.python-version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Compile Python sources
        run: uv run python -m compileall -q src tests

      - name: Run tests
        run: uv run pytest -q

  build-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: release-build-package-py3.11

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        shell: bash
        run: |
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf 'BUILD_TIME = "%s"\n' "${build_time}" > src/memoria/build_info.py
          uv build

      - name: Smoke test wheel install
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/memoria-wheel-smoke
          /tmp/memoria-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/memoria-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/memoria-wheel-smoke/bin/memoria --help
          version_output="$(/tmp/memoria-wheel-smoke/bin/memoria --version)"
          echo "${version_output}"
          grep -Fx "Memoria ${{ needs.validate-release.outputs.version }}" <<< "${version_output}"
          grep -Ex "Build time: [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z" <<< "${version_output}"
          if grep -F "Build time: unknown" <<< "${version_output}"; then
            echo "Wheel build time should not be unknown" >&2
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-package
          path: dist/*

  build-binaries:
    name: Build ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.os }}
    needs:
      - validate-release
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: memoria-linux-x86_64
            executable-name: memoria
          - os: macos-latest
            artifact-name: memoria-macos-arm64
            executable-name: memoria
          - os: windows-latest
            artifact-name: memoria-windows-x86_64.exe
            executable-name: memoria.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: release-binary-${{ matrix.artifact-name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra binary

      - name: Build binary
        shell: bash
        run: |
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf 'BUILD_TIME = "%s"\n' "${build_time}" > src/memoria/build_info.py
          uv run pyinstaller \
            --onefile \
            --name memoria \
            --copy-metadata memoria-cli \
            src/memoria/__main__.py
          mkdir -p release-assets
          cp "dist/${{ matrix.executable-name }}" "release-assets/${{ matrix.artifact-name }}"

      - name: Smoke test binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./release-assets/${{ matrix.artifact-name }} --help
            version_output="$(./release-assets/${{ matrix.artifact-name }} --version)"
          else
            chmod +x ./release-assets/${{ matrix.artifact-name }}
            ./release-assets/${{ matrix.artifact-name }} --help
            version_output="$(./release-assets/${{ matrix.artifact-name }} --version)"
          fi
          echo "${version_output}"
          grep -Fx "Memoria ${{ needs.validate-release.outputs.version }}" <<< "${version_output}"
          grep -Ex "Build time: [0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z" <<< "${version_output}"
          if grep -F "Build time: unknown" <<< "${version_output}"; then
            echo "Binary build time should not be unknown" >&2
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: release-assets/${{ matrix.artifact-name }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-package
    if: github.event_name == 'push' || inputs.publish_pypi
    environment:
      name: pypi
      url: https://pypi.org/p/memoria-cli
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v7
        with:
          name: python-package
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-package
      - build-binaries
      - publish-pypi
    if: always() && needs.build-package.result == 'success' && needs.build-binaries.result == 'success' && (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-downloads
          pattern: memoria-*

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find release-downloads -maxdepth 3 -type f -print -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Prepare release notes
        env:
          VERSION: ${{ needs.validate-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md")
          headings = (
              f"## {version}",
              f"## v{version}",
              f"## [{version}]",
              f"## [v{version}]",
          )

          if changelog.exists():
              lines = changelog.read_text(encoding="utf-8").splitlines()
              start = next(
                  (
                      index
                      for index, line in enumerate(lines)
                      if any(line.strip().startswith(heading) for heading in headings)
                  ),
                  None,
              )
              if start is not None:
                  end = next(
                      (
                          index
                          for index in range(start + 1, len(lines))
                          if lines[index].startswith("## ")
                      ),
                      len(lines),
                  )
                  notes = "\n".join(lines[start + 1 : end]).strip()
                  if notes:
                      Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
                      raise SystemExit

          Path("release-notes.md").write_text(
              f"Memoria {version}\n\nSee commit history for release details.\n",
              encoding="utf-8",
          )
          PY
          cat release-notes.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate-release.outputs.tag }}
          VERSION: ${{ needs.validate-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "Memoria ${VERSION}" \
              --notes-file release-notes.md
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* \
              --title "Memoria ${VERSION}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}"
          fi
